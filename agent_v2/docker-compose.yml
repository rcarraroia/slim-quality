version: '3.8'

services:
  bia-redis:
    image: redis:7-alpine
    container_name: bia-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - bia-network
    restart: unless-stopped

  bia-agent:
    build: .
    container_name: bia-agent
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - bia-redis
    networks:
      - bia-network
    restart: unless-stopped

volumes:
  redis-data:

networks:
  bia-network:
    driver: bridge
